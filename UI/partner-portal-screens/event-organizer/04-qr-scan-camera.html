<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>E-04 / イベント受付</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="tablet-frame">
    <header class="app-header">
      <div class="brand">
        <button class="icon-btn">←</button>
        <div>
          <div class="brand-name">商店街清掃ボランティア</div>
          <div class="brand-sub">10:00 〇〇商店街中央広場</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="counter">
          <div class="num">12</div>
          <div class="lbl">受付済</div>
        </div>
      </div>
    </header>

    <div class="scan-stage">
      <div class="scan-info">
        <div>
          <div class="label">付与ポイント</div>
          <div class="points-large">+100<span style="font-size:28px; font-weight:700; margin-left:8px;">pt</span></div>
        </div>
        <div class="target-meta">
          <div class="row">
            <span class="icon">📅</span>
            <span>2026年 6月 22日 10:00〜12:00</span>
          </div>
          <div class="row">
            <span class="icon">📍</span>
            <span>〇〇商店街中央広場</span>
          </div>
        </div>
        <div style="margin-top:24px;">
          <button class="btn btn-outline" style="font-size:18px; height:64px;">⌨ 手入力で受付</button>
        </div>
      </div>

      <div class="scan-target">
        <div class="qr-frame">
          <div class="corners"></div>
          <div class="qr-icon">▦</div>
        </div>
        <div class="prompt">QRコードをかざしてください</div>
      </div>
    </div>

    <div class="frame-id">E—04</div>
  </div>
</body>
</html>
