<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>E-06 / イベント受付</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="tablet-frame">
    <!-- 背景 (受付画面、モーダルでブロック) -->
    <header class="app-header" style="opacity:0.3;">
      <div class="brand">
        <button class="icon-btn">←</button>
        <div>
          <div class="brand-name">商店街清掃ボランティア</div>
          <div class="brand-sub">10:00 〇〇商店街中央広場</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="counter">
          <div class="num">12</div>
          <div class="lbl">受付済</div>
        </div>
      </div>
    </header>
    <div class="scan-stage" style="opacity:0.3;">
      <div class="scan-info">
        <div class="points-large">+100<span style="font-size:28px; margin-left:8px;">pt</span></div>
      </div>
      <div class="scan-target">
        <div class="qr-frame">
          <div class="corners"></div>
          <div class="qr-icon">▦</div>
        </div>
      </div>
    </div>

    <!-- モーダル -->
    <div class="modal-overlay">
      <div class="modal">
        <h2>受付しますか？</h2>
        <div class="recipient">
          <div class="name">中村 雅子</div>
        </div>
        <div class="delta">
          <div class="label">付与ポイント</div>
          <div class="value">+100<span style="font-size:32px; margin-left:8px;">pt</span></div>
          <div class="for">商店街清掃ボランティア</div>
        </div>
        <div class="actions">
          <button class="btn btn-outline btn-xl">キャンセル</button>
          <button class="btn btn-primary btn-xl">受付する</button>
        </div>
      </div>
    </div>

    <div class="frame-id">E—06</div>
  </div>
</body>
</html>
