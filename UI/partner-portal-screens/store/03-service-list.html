<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>S-03 / 商品交換</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="theme-store">
  <div class="tablet-frame">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">L</div>
        <div>
          <div class="brand-name">Link Town</div>
          <div class="brand-sub">商品交換</div>
        </div>
      </div>
      <div class="context">
        <div class="context-name">まちのパン屋</div>
        <div class="context-meta">東京都千代田区有楽町1丁目</div>
      </div>
    </header>

    <h2 style="font-size:36px; font-weight:700; margin-bottom:32px;">取扱い商品</h2>

    <div class="item-grid">
      <article class="item-card is-store">
        <div class="thumb">🥐</div>
        <div class="body">
          <div class="title">焼きたてパン引換券</div>
          <div class="meta">
            <span>在庫 22</span>
          </div>
          <div class="points-pill">180pt</div>

      <article class="item-card is-store">
        <div class="thumb">☕</div>
        <div class="body">
          <div class="title">コーヒー 1杯引換券</div>
          <div class="meta">
            <span>在庫 50</span>
          </div>
          <div class="points-pill">120pt</div>
        </div>
      </article>

      <article class="item-card is-store">
        <div class="thumb">🍦</div>
        <div class="body">
          <div class="title">夏季限定アイス</div>
          <div class="meta">
            <span>在庫 15</span>
          </div>
          <div class="points-pill">250pt</div>
        </div>
      </article>
    </div>

    <div class="frame-id">S—03</div>
  </div>
</body>
</html>
