<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>S-06 / 商品交換</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="theme-store">
  <div class="tablet-frame">
    <header class="app-header" style="opacity:0.3;">
      <div class="brand">
        <button class="icon-btn">←</button>
        <div>
          <div class="brand-name">焼きたてパン引換券</div>
          <div class="brand-sub">まちのパン屋</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="counter">
          <div class="num">8</div>
          <div class="lbl">本日交換</div>
        </div>
      </div>
    </header>
    <div class="scan-stage" style="opacity:0.3;">
      <div class="scan-info">
        <div class="points-large">180<span style="font-size:28px; margin-left:8px;">pt</span></div>
      </div>
      <div class="scan-target">
        <div class="qr-frame">
          <div class="corners"></div>
          <div class="qr-icon">▦</div>
        </div>
      </div>
    </div>

    <div class="modal-overlay">
      <div class="modal">
        <h2>交換しますか？</h2>
        <div class="recipient">
          <div class="name">山田 太郎</div>
        </div>
        <div class="delta">
          <div class="label">消費ポイント</div>
          <div class="value">−180<span style="font-size:32px; margin-left:8px;">pt</span></div>
          <div class="for">焼きたてパン引換券 × 1</div>
        </div>
        <div class="actions">
          <button class="btn btn-outline btn-xl">キャンセル</button>
          <button class="btn btn-primary btn-xl">交換する</button>
        </div>
      </div>
    </div>

    <div class="frame-id">S—06</div>
  </div>
</body>
</html>
