<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>S-04 / 商品交換</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="theme-store">
  <div class="tablet-frame">
    <header class="app-header">
      <div class="brand">
        <button class="icon-btn">←</button>
        <div>
          <div class="brand-name">焼きたてパン引換券</div>
          <div class="brand-sub">まちのパン屋</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="counter">
          <div class="num">8</div>
          <div class="lbl">本日交換</div>
        </div>
      </div>
    </header>

    <div class="scan-stage">
      <div class="scan-info">
        <div>
          <div class="label">必要ポイント</div>
          <div class="points-large">180<span style="font-size:28px; font-weight:700; margin-left:8px;">pt</span></div>
        </div>
        <div class="target-meta">
          <div class="row">
            <span class="icon">📦</span>
            <span>在庫 残り22個</span>
          </div>
          <div class="row">
            <span class="icon">⭐</span>
            <span>商店街の人気商品</span>
          </div>
        </div>
        <div style="margin-top:24px;">
          <button class="btn btn-outline" style="font-size:18px; height:64px;">⌨ 手入力で交換</button>
        </div>
      </div>

      <div class="scan-target">
        <div class="qr-frame">
          <div class="corners"></div>
          <div class="qr-icon">▦</div>
        </div>
        <div class="prompt">QRコードをかざしてください</div>
      </div>
    </div>

    <div class="frame-id">S—04</div>
  </div>
</body>
</html>
