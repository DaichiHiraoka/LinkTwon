<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>S-07 / 商品交換</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="theme-store">
  <div class="tablet-frame">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">L</div>
        <div>
          <div class="brand-name">Link Town</div>
          <div class="brand-sub">商品交換</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="counter">
          <div class="num">9</div>
          <div class="lbl">本日交換</div>
        </div>
      </div>
    </header>

    <div class="success-stage">
      <div class="check">✓</div>
      <div class="msg">交換しました</div>
      <div class="name-line"><strong>山田 太郎</strong> さんに</div>
      <div style="font-size:40px; font-weight:700; margin-bottom:16px;">焼きたてパン引換券</div>
      <div class="delta">−180 pt 消費</div>
      <div class="next">
        <button class="btn btn-primary btn-xl">続けて交換する</button>
      </div>
    </div>

    <div class="frame-id">S—07</div>
  </div>
</body>
</html>
