<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>S-05 / 商品交換</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="theme-store">
  <div class="tablet-frame">
    <header class="app-header">
      <div class="brand">
        <button class="icon-btn">←</button>
        <div>
          <div class="brand-name">焼きたてパン引換券</div>
          <div class="brand-sub">まちのパン屋</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="counter">
          <div class="num">8</div>
          <div class="lbl">本日交換</div>
        </div>
      </div>
    </header>

    <div class="center-stage" style="min-height:840px;">
      <div class="center-stage-inner">
        <h2 style="font-size:36px; font-weight:700; text-align:center; margin-bottom:32px;">QRの内容を入力</h2>
        <textarea class="input" placeholder="貼り付けてください">linktown://user-present?user_id=u-12345&name=山田太郎&nonce=m4s7n2v8</textarea>

        <div style="margin-top:32px; background:var(--card); border-radius:24px; padding:28px 32px; box-shadow:var(--shadow-card);">
          <div style="font-size:18px; color:var(--ink-soft); margin-bottom:8px;">利用者</div>
          <div style="font-size:36px; font-weight:700;">山田 太郎</div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 2fr; gap:20px; margin-top:32px;">
          <button class="btn btn-outline btn-xl">📷 カメラ</button>
          <button class="btn btn-primary btn-xl">確認する</button>
        </div>
      </div>
    </div>

    <div class="frame-id">S—05</div>
  </div>
</body>
</html>
