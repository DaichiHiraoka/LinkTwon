services:
  - type: web
    name: linktwon-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_CLIENT
        value: mysql
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FRONTEND_ORIGIN_PATTERNS
        value: ^https://.*\.vercel\.app$
      - key: FRONTEND_BASE_URL
        sync: false
      - key: MAIL_DRIVER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TRANSLATION_REFRESH_KEY
        sync: false
      - key: TRANSLATION_PROVIDER
        sync: false
      - key: DEEPL_API_KEY
        sync: false
